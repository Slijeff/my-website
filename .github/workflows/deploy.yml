name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        env:
          RAINDROP_TOKEN: ${{ secrets.RAINDROP_TOKEN }}
        run: |
          DOCKER_BUILDKIT=1 sudo -E docker build \
            --build-arg PRODUCTION_METADATA_BASE=${{ secrets.PRODUCTION_METADATA_BASE }} \
            --secret id=raindrop_token,env=RAINDROP_TOKEN \
            -t my-website:latest .

      - name: Deploy container
        run: |
          sudo docker stop my-website || true
          sudo docker rm my-website || true
          sudo docker run -d \
            --name my-website \
            --restart unless-stopped \
            --network npm_shared \
            my-website:latest

      - name: Clean up old images
        if: always()
        run: sudo docker image prune -f
      
      - name: Clean up Docker build cache
        if: always()
        run: docker buildx prune -f

      - name: Clean up Docker
        if: always()
        run: docker system prune -f

